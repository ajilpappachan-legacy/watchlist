services:
  watchlist:
    build: .
    container_name: watchlist-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - DATABASE_PATH=/app/data/watchlist.db
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    networks:
      - watchlist-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/watchlist"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: watchlist-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - watchlist-net
    depends_on:
      watchlist:
        condition: service_healthy

networks:
  watchlist-net:
    driver: bridge
